// MATHS
function QuadraticCalc(){
  const [a,setA]=useState(""); const [b,setB]=useState(""); const [c,setC]=useState(""); const [res,setRes]=useState(null);
  const calc=()=>{const av=parseFloat(a),bv=parseFloat(b),cv=parseFloat(c);const disc=bv*bv-4*av*cv;if(disc<0)setRes({type:"complex",d:disc});else if(disc===0)setRes({type:"one",x:(-bv/(2*av)).toFixed(4)});else setRes({type:"two",x1:((-bv+Math.sqrt(disc))/(2*av)).toFixed(4),x2:((-bv-Math.sqrt(disc))/(2*av)).toFixed(4)});};
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>📐 Quadratic Equation Solver</h3>
    <p style={{fontSize:13,color:"#888",marginBottom:12}}>Solves ax² + bx + c = 0</p>
    <Field label="a (coefficient of x²)"><input type="number" value={a} onChange={e=>setA(e.target.value)} placeholder="e.g. 1" style={iStyle}/></Field>
    <Field label="b (coefficient of x)"><input type="number" value={b} onChange={e=>setB(e.target.value)} placeholder="e.g. -5" style={iStyle}/></Field>
    <Field label="c (constant)"><input type="number" value={c} onChange={e=>setC(e.target.value)} placeholder="e.g. 6" style={iStyle}/></Field>
    <button onClick={calc} style={btnStyle}>Solve</button>
    {res&&<div style={resStyle}>{res.type==="two"?<span>x₁ = <strong>{res.x1}</strong> | x₂ = <strong>{res.x2}</strong></span>:res.type==="one"?<span>x = <strong>{res.x}</strong> (one solution)</span>:<span>No real solutions (discriminant = {res.d})</span>}</div>}
  </div>;
}

function PythagorasCalc(){
  const [a,setA]=useState(""); const [b,setB]=useState(""); const [hyp,setHyp]=useState(""); const [res,setRes]=useState(null);
  const calc=()=>{if(a&&b)setRes({find:"c",val:Math.sqrt(parseFloat(a)**2+parseFloat(b)**2).toFixed(4)});else if(a&&hyp)setRes({find:"b",val:Math.sqrt(parseFloat(hyp)**2-parseFloat(a)**2).toFixed(4)});else if(b&&hyp)setRes({find:"a",val:Math.sqrt(parseFloat(hyp)**2-parseFloat(b)**2).toFixed(4)});};
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>📏 Pythagorean Theorem</h3>
    <p style={{fontSize:13,color:"#888",marginBottom:12}}>a² + b² = c² | Leave one field blank to find it</p>
    <Field label="Side a"><input type="number" value={a} onChange={e=>setA(e.target.value)} placeholder="Leave blank to find" style={iStyle}/></Field>
    <Field label="Side b"><input type="number" value={b} onChange={e=>setB(e.target.value)} placeholder="Leave blank to find" style={iStyle}/></Field>
    <Field label="Hypotenuse c"><input type="number" value={hyp} onChange={e=>setHyp(e.target.value)} placeholder="Leave blank to find" style={iStyle}/></Field>
    <button onClick={calc} style={btnStyle}>Calculate</button>
    {res&&<div style={resStyle}>Side <strong>{res.find}</strong> = <strong>{res.val}</strong></div>}
  </div>;
}

function StatisticsCalc(){
  const [nums,setNums]=useState(""); const [res,setRes]=useState(null);
  const calc=()=>{
    const arr=nums.split(",").map(n=>parseFloat(n.trim())).filter(n=>!isNaN(n));
    if(!arr.length)return;
    const sorted=[...arr].sort((a,b)=>a-b);
    const mean=(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(4);
    const mid=Math.floor(sorted.length/2);
    const median=sorted.length%2===0?((sorted[mid-1]+sorted[mid])/2).toFixed(4):sorted[mid].toFixed(4);
    const freq={};arr.forEach(n=>freq[n]=(freq[n]||0)+1);
    const maxFreq=Math.max(...Object.values(freq));
    const mode=Object.keys(freq).filter(k=>freq[k]===maxFreq).join(", ");
    const range=(sorted[sorted.length-1]-sorted[0]).toFixed(4);
    setRes({mean,median,mode,range,count:arr.length});
  };
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>📊 Statistics Calculator</h3>
    <Field label="Enter numbers (comma separated)"><input type="text" value={nums} onChange={e=>setNums(e.target.value)} placeholder="e.g. 4, 7, 2, 9, 4, 1" style={iStyle}/></Field>
    <button onClick={calc} style={btnStyle}>Calculate</button>
    {res&&<div style={resStyle}>Count: <strong>{res.count}</strong><br/>Mean: <strong>{res.mean}</strong><br/>Median: <strong>{res.median}</strong><br/>Mode: <strong>{res.mode}</strong><br/>Range: <strong>{res.range}</strong></div>}
  </div>;
}

function FractionCalc(){
  const [n1,setN1]=useState(""); const [d1,setD1]=useState(""); const [op,setOp]=useState("+"); const [n2,setN2]=useState(""); const [d2,setD2]=useState(""); const [res,setRes]=useState(null);
  const gcd=(a,b)=>b===0?a:gcd(b,a%b);
  const calc=()=>{
    const a=parseInt(n1),b=parseInt(d1),c=parseInt(n2),d=parseInt(d2);
    let rn,rd;
    if(op==="+"){rn=a*d+c*b;rd=b*d;}else if(op==="-"){rn=a*d-c*b;rd=b*d;}else if(op==="×"){rn=a*c;rd=b*d;}else{rn=a*d;rd=b*c;}
    const g=gcd(Math.abs(rn),Math.abs(rd));
    setRes({n:rn/g,d:rd/g,dec:(rn/rd).toFixed(4)});
  };
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>½ Fraction Calculator</h3>
    <div style={{display:"flex",gap:8,alignItems:"center",marginTop:12}}>
      <div style={{flex:1}}><Field label="Numerator 1"><input type="number" value={n1} onChange={e=>setN1(e.target.value)} style={iStyle}/></Field><Field label="Denominator 1"><input type="number" value={d1} onChange={e=>setD1(e.target.value)} style={iStyle}/></Field></div>
      <select value={op} onChange={e=>setOp(e.target.value)} style={{...iStyle,width:60,textAlign:"center",marginTop:20}}><option>+</option><option>-</option><option>×</option><option>÷</option></select>
      <div style={{flex:1}}><Field label="Numerator 2"><input type="number" value={n2} onChange={e=>setN2(e.target.value)} style={iStyle}/></Field><Field label="Denominator 2"><input type="number" value={d2} onChange={e=>setD2(e.target.value)} style={iStyle}/></Field></div>
    </div>
    <button onClick={calc} style={btnStyle}>Calculate</button>
    {res&&<div style={resStyle}>Result: <strong>{res.n}/{res.d}</strong> = <strong>{res.dec}</strong></div>}
  </div>;
}

function PrimeCalc(){
  const [n,setN]=useState(""); const [res,setRes]=useState(null);
  const calc=()=>{
    const num=parseInt(n);
    if(num<2){setRes({prime:false,num});return;}
    let prime=true;
    for(let i=2;i<=Math.sqrt(num);i++){if(num%i===0){prime=false;break;}}
    setRes({prime,num});
  };
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🔢 Prime Number Checker</h3>
    <Field label="Enter a number"><input type="number" value={n} onChange={e=>setN(e.target.value)} placeholder="e.g. 17" style={iStyle}/></Field>
    <button onClick={calc} style={btnStyle}>Check</button>
    {res&&<div style={{...resStyle,background:res.prime?"#f0fff4":"#fff0f0"}}><strong>{res.num}</strong> is {res.prime?"✅ a PRIME number!":"❌ NOT a prime number."}</div>}
  </div>;
}

function LCMHCFCalc(){
  const [nums,setNums]=useState(""); const [res,setRes]=useState(null);
  const gcd=(a,b)=>b===0?a:gcd(b,a%b);
  const lcm=(a,b)=>a*b/gcd(a,b);
  const calc=()=>{
    const arr=nums.split(",").map(n=>parseInt(n.trim())).filter(n=>!isNaN(n));
    if(arr.length<2)return;
    const hcf=arr.reduce((a,b)=>gcd(a,b));
    const lcmVal=arr.reduce((a,b)=>lcm(a,b));
    setRes({hcf,lcm:lcmVal});
  };
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🔣 LCM & HCF Calculator</h3>
    <Field label="Enter numbers (comma separated)"><input type="text" value={nums} onChange={e=>setNums(e.target.value)} placeholder="e.g. 12, 18, 24" style={iStyle}/></Field>
    <button onClick={calc} style={btnStyle}>Calculate</button>
    {res&&<div style={resStyle}>HCF (GCD): <strong>{res.hcf}</strong><br/>LCM: <strong>{res.lcm}</strong></div>}
  </div>;
}

function ScientificCalc(){
  const [display,setDisplay]=useState("0"); const [expr,setExpr]=useState("");
  const press=(val)=>{
    try{
      if(val==="="){const result=eval(expr.replace(/×/g,"*").replace(/÷/g,"/").replace(/π/g,Math.PI).replace(/√\(/g,"Math.sqrt(").replace(/sin\(/g,"Math.sin(").replace(/cos\(/g,"Math.cos(").replace(/tan\(/g,"Math.tan(").replace(/log\(/g,"Math.log10(").replace(/ln\(/g,"Math.log("));setDisplay(String(parseFloat(result.toFixed(8))));setExpr("");}
      else if(val==="C"){setDisplay("0");setExpr("");}
      else if(val==="⌫"){setExpr(e=>e.slice(0,-1))||setDisplay("0");}
      else{setExpr(e=>e+val);setDisplay(expr+val);}
    }catch{setDisplay("Error");setExpr("");}
  };
  const btns=[["C","⌫","(",")"],["sin(","cos(","tan(","√("],["7","8","9","÷"],["4","5","6","×"],["1","2","3","-"],["π","0",".","+"],["%","^","ln(","="]];
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🧮 Scientific Calculator</h3>
    <div style={{background:"#1a1a2e",borderRadius:12,padding:"12px 16px",marginBottom:12,textAlign:"right"}}>
      <div style={{color:"#888",fontSize:13,minHeight:20}}>{expr}</div>
      <div style={{color:"white",fontSize:28,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{display}</div>
    </div>
    {btns.map((row,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:6}}>
      {row.map(b=><button key={b} onClick={()=>press(b)} style={{padding:"14px 0",background:b==="="?"#6c63ff":b==="C"?"#e74c3c":["⌫","(",")"].includes(b)?"#444":"#2a2a40",color:"white",border:"none",borderRadius:8,fontSize:b.length>2?12:16,fontWeight:600,cursor:"pointer"}}>{b}</button>)}
    </div>)}
  </div>;
}

// PHYSICS
function OhmsLawCalc(){
  const [v,setV]=useState(""); const [i,setI]=useState(""); const [r,setR]=useState(""); const [res,setRes]=useState(null);
  const calc=()=>{
    const vv=parseFloat(v),iv=parseFloat(i),rv=parseFloat(r);
    if(v&&i)setRes({find:"R",val:(vv/iv).toFixed(4),unit:"Ω"});
    else if(v&&r)setRes({find:"I",val:(vv/rv).toFixed(4),unit:"A"});
    else if(i&&r)setRes({find:"V",val:(iv*rv).toFixed(4),unit:"V"});
  };
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>⚡ Ohm's Law Calculator</h3>
    <p style={{fontSize:13,color:"#888",marginBottom:12}}>V = IR | Leave one blank to find it</p>
    <Field label="Voltage V (volts)"><input type="number" value={v} onChange={e=>setV(e.target.value)} placeholder="Leave blank to find" style={iStyle}/></Field>
    <Field label="Current I (amperes)"><input type="number" value={i} onChange={e=>setI(e.target.value)} placeholder="Leave blank to find" style={iStyle}/></Field>
    <Field label="Resistance R (ohms)"><input type="number" value={r} onChange={e=>setR(e.target.value)} placeholder="Leave blank to find" style={iStyle}/></Field>
    <button onClick={calc} style={btnStyle}>Calculate</button>
    {res&&<div style={resStyle}><strong>{res.find}</strong> = <strong>{res.val} {res.unit}</strong></div>}
  </div>;
}

function VelocityCalc(){

    const dv=parseFloat(d),tv=parseFloat(t),vv=parseFloat(v);
    if(d&&t)setRes({find:"Velocity",val:(dv/tv).toFixed(4),unit:"m/s"});

    <Field label="Velocity (m/s)"><input type="number" value={v} onChange={e=>setV(e.target.value)} placeholder="Leave blank to find" style={iStyle}/></Field>
    <button onClick={calc} style={btnStyle}>Calculate</button>
    {res&&<div style={resStyle}><strong>{res.find}</strong> = <strong>{res.val} {res.unit}</strong></div>}
  </div>;
}

function PowerCalc(){
  const [w,setW]=useState(""); const [v,setV]=useState(""); const [i,setI]=useState(""); const [res,setRes]=useState(null);
  const calc=()=>{
    const wv=parseFloat(w),vv=parseFloat(v),iv=parseFloat(i);

function MolarMassCalc(){
  const elements={"H":1.008,"He":4.003,"Li":6.941,"Be":9.012,"B":10.811,"C":12.011,"N":14.007,"O":15.999,"F":18.998,"Ne":20.180,"Na":22.990,"Mg":24.305,"Al":26.982,"Si":28.086,"P":30.974,"S":32.065,"Cl":35.453,"Ar":39.948,"K":39.098,"Ca":40.078,"Fe":55.845,"Cu":63.546,"Zn":65.38,"Br":79.904,"Ag":107.868,"I":126.904,"Au":196.967,"Pb":207.2};
  const [formula,setFormula]=useState(""); const [res,setRes]=useState(null);
  const calc=()=>{
    let mass=0; let valid=true;
    const regex=/([A-Z][a-z]?)(\d*)/g; let match;
    while((match=regex.exec(formula))!==null){
      const el=match[1]; const count=parseInt(match[2])||1;
      if(elements[el]){mass+=elements[el]*count;}else{valid=false;break;}
    }
    setRes(valid?{mass:mass.toFixed(4)}:{error:true});
  };
  return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>⚗️ Molar Mass Calculator</h3>
    <p style={{fontSize:13,color:"#888",marginBottom:12}}>Enter chemical formula e.g. H2O, NaCl, C6H12O6</p>

    <button onClick={calc} style={btnStyle}>Calculate</button>
    {res&&<div style={resStyle}>{res.error?"Invalid formula — check element symbols":"Molar Mass = "}<strong>{res.error?"":res.mass+" g/mol"}</strong></div>}
  </div>;
}

function DiscountCalc(){const [price,setPrice]=useState("");const [disc,setDisc]=useState("");const [res,setRes]=useState(null);const calc=()=>{const p=parseFloat(price),d=parseFloat(disc);setRes({saved:(p*d/100).toFixed(2),final:(p-p*d/100).toFixed(2)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🏷️ Discount Calculator</h3><Field label="Original Price ($)"><input type="number" value={price} onChange={e=>setPrice(e.target.value)} placeholder="e.g. 100" style={iStyle}/></Field><Field label="Discount (%)"><input type="number" value={disc} onChange={e=>setDisc(e.target.value)} placeholder="e.g. 20" style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>You save: <strong>${res.saved}</strong> | Final: <strong>${res.final}</strong></div>}</div>;}
function CompoundCalc(){const [p,setP]=useState("");const [r,setR]=useState("");const [t,setT]=useState("");const [res,setRes]=useState(null);const calc=()=>{const principal=parseFloat(p),rate=parseFloat(r)/100,time=parseFloat(t);const amt=(principal*Math.pow(1+rate,time)).toFixed(2);setRes({amt,int:(amt-principal).toFixed(2)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>📈 Compound Interest</h3><Field label="Principal ($)"><input type="number" value={p} onChange={e=>setP(e.target.value)} placeholder="e.g. 1000" style={iStyle}/></Field><Field label="Annual Rate (%)"><input type="number" value={r} onChange={e=>setR(e.target.value)} placeholder="e.g. 8" style={iStyle}/></Field><Field label="Years"><input type="number" value={t} onChange={e=>setT(e.target.value)} placeholder="e.g. 10" style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>Total: <strong>${res.amt}</strong> | Interest: <strong>${res.int}</strong></div>}</div>;}
function MortgageCalc(){const [home,setHome]=useState("");const [down,setDown]=useState("");const [r,setR]=useState("");const [y,setY]=useState("");const [res,setRes]=useState(null);const calc=()=>{const p=parseFloat(home)-parseFloat(down),rate=parseFloat(r)/100/12,n=parseFloat(y)*12;const m=(p*rate*Math.pow(1+rate,n))/(Math.pow(1+rate,n)-1);setRes({m:m.toFixed(2),t:(m*n).toFixed(2),i:(m*n-p).toFixed(2)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🏠 Mortgage Calculator</h3><Field label="Home Price ($)"><input type="number" value={home} onChange={e=>setHome(e.target.value)} placeholder="e.g. 300000" style={iStyle}/></Field><Field label="Down Payment ($)"><input type="number" value={down} onChange={e=>setDown(e.target.value)} placeholder="e.g. 60000" style={iStyle}/></Field><Field label="Annual Rate (%)"><input type="number" value={r} onChange={e=>setR(e.target.value)} placeholder="e.g. 6.5" style={iStyle}/></Field><Field label="Term (years)"><input type="number" value={y} onChange={e=>setY(e.target.value)} placeholder="e.g. 30" style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>Monthly: <strong>${res.m}</strong> | Total: <strong>${res.t}</strong> | Interest: <strong>${res.i}</strong></div>}</div>;}
function ProfitCalc(){const [cost,setCost]=useState("");const [rev,setRev]=useState("");const [res,setRes]=useState(null);const calc=()=>{const c=parseFloat(cost),r=parseFloat(rev);const profit=r-c;const margin=((profit/r)*100).toFixed(2);const markup=((profit/c)*100).toFixed(2);setRes({profit:profit.toFixed(2),margin,markup});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>💰 Profit Calculator</h3><Field label="Cost Price ($)"><input type="number" value={cost} onChange={e=>setCost(e.target.value)} placeholder="e.g. 50" style={iStyle}/></Field><Field label="Selling Price ($)"><input type="number" value={rev} onChange={e=>setRev(e.target.value)} placeholder="e.g. 80" style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>Profit: <strong>${res.profit}</strong> | Margin: <strong>{res.margin}%</strong> | Markup: <strong>{res.markup}%</strong></div>}</div>;}
function InsuranceCalc(){const [age,setAge]=useState("");const [cov,setCov]=useState("");const [type,setType]=useState("life");const [sm,setSm]=useState("no");const [res,setRes]=useState(null);const calc=()=>{const a=parseInt(age),c=parseFloat(cov);let r=type==="life"?0.003:type==="health"?0.05:0.008;if(a>40)r*=1.5;if(a>55)r*=2.5;if(sm==="yes")r*=2;setRes({m:(c*r/12).toFixed(2),a:(c*r).toFixed(2)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🛡️ Insurance Estimator</h3><Field label="Age"><input type="number" value={age} onChange={e=>setAge(e.target.value)} placeholder="e.g. 35" style={iStyle}/></Field><Field label="Coverage ($)"><input type="number" value={cov} onChange={e=>setCov(e.target.value)} placeholder="e.g. 100000" style={iStyle}/></Field><Field label="Type"><select value={type} onChange={e=>setType(e.target.value)} style={iStyle}><option value="life">Life</option><option value="health">Health</option><option value="auto">Auto</option></select></Field><Field label="Smoker?"><select value={sm} onChange={e=>setSm(e.target.value)} style={iStyle}><option value="no">No</option><option value="yes">Yes</option></select></Field><button onClick={calc} style={btnStyle}>Estimate</button>{res&&<div style={resStyle}>Monthly: <strong>${res.m}</strong> | Annual: <strong>${res.a}</strong></div>}</div>;}
function DateCalc(){const [d1,setD1]=useState("");const [d2,setD2]=useState("");const [res,setRes]=useState(null);const calc=()=>{const diff=Math.abs(new Date(d2)-new Date(d1));const days=Math.floor(diff/(1000*60*60*24));setRes({days,weeks:Math.floor(days/7),months:Math.floor(days/30)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>📅 Date Calculator</h3><Field label="Start Date"><input type="date" value={d1} onChange={e=>setD1(e.target.value)} style={iStyle}/></Field><Field label="End Date"><input type="date" value={d2} onChange={e=>setD2(e.target.value)} style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}><strong>{res.days}</strong> days | <strong>{res.weeks}</strong> weeks | ~<strong>{res.months}</strong> months</div>}</div>;}
function SpeedCalc(){const [val,setVal]=useState("");const [from,setFrom]=useState("kmh");const [res,setRes]=useState(null);const toMs={kmh:1/3.6,mph:0.44704,ms:1,knot:0.514444};const calc=()=>{const ms=parseFloat(val)*toMs[from];setRes({kmh:(ms*3.6).toFixed(2),mph:(ms/0.44704).toFixed(2),ms:ms.toFixed(2)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🚀 Speed Converter</h3><Field label="Value"><input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="Enter speed" style={iStyle}/></Field><Field label="From"><select value={from} onChange={e=>setFrom(e.target.value)} style={iStyle}><option value="kmh">km/h</option><option value="mph">mph</option><option value="ms">m/s</option><option value="knot">knots</option></select></Field><button onClick={calc} style={btnStyle}>Convert</button>{res&&<div style={resStyle}>km/h: <strong>{res.kmh}</strong> | mph: <strong>{res.mph}</strong> | m/s: <strong>{res.ms}</strong></div>}</div>;}
function AreaCalc(){const [val,setVal]=useState("");const [from,setFrom]=useState("m2");const [res,setRes]=useState(null);const toM2={m2:1,km2:1e6,ft2:0.092903,acre:4046.86,ha:10000};const calc=()=>{const m2=parseFloat(val)*toM2[from];setRes({m2:m2.toFixed(2),ft2:(m2/0.092903).toFixed(2),acre:(m2/4046.86).toFixed(4),ha:(m2/10000).toFixed(4)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>📐 Area Converter</h3><Field label="Value"><input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="Enter area" style={iStyle}/></Field><Field label="From"><select value={from} onChange={e=>setFrom(e.target.value)} style={iStyle}><option value="m2">m²</option><option value="km2">km²</option><option value="ft2">ft²</option><option value="acre">acres</option><option value="ha">ha</option></select></Field><button onClick={calc} style={btnStyle}>Convert</button>{res&&<div style={resStyle}>m²: <strong>{res.m2}</strong> | ft²: <strong>{res.ft2}</strong> | acres: <strong>{res.acre}</strong> | ha: <strong>{res.ha}</strong></div>}</div>;}
function CurrencyCalc(){return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>💱 Currency Converter</h3><p style={{color:"#888",fontSize:14,lineHeight:1.7}}>Live currency data requires an API key. Visit <a href="https://wise.com/currency-converter" target="_blank" rel="noreferrer" style={{color:"#6c63ff"}}>Wise.com</a> for live rates.</p></div>;}
function CalorieCalc(){const [age,setAge]=useState("");const [w,setW]=useState("");const [h,setH]=useState("");const [sex,setSex]=useState("male");const [act,setAct]=useState("1.2");const [res,setRes]=useState(null);const calc=()=>{let bmr=sex==="male"?10*parseFloat(w)+6.25*parseFloat(h)-5*parseFloat(age)+5:10*parseFloat(w)+6.25*parseFloat(h)-5*parseFloat(age)-161;setRes(Math.round(bmr*parseFloat(act)));};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🥗 Calorie Calculator</h3><Field label="Age"><input type="number" value={age} onChange={e=>setAge(e.target.value)} placeholder="e.g. 25" style={iStyle}/></Field><Field label="Weight (kg)"><input type="number" value={w} onChange={e=>setW(e.target.value)} placeholder="e.g. 70" style={iStyle}/></Field><Field label="Height (cm)"><input type="number" value={h} onChange={e=>setH(e.target.value)} placeholder="e.g. 175" style={iStyle}/></Field><Field label="Sex"><select value={sex} onChange={e=>setSex(e.target.value)} style={iStyle}><option value="male">Male</option><option value="female">Female</option></select></Field><Field label="Activity"><select value={act} onChange={e=>setAct(e.target.value)} style={iStyle}><option value="1.2">Sedentary</option><option value="1.375">Light exercise</option><option value="1.55">Moderate</option><option value="1.725">Heavy exercise</option></select></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>Daily calories: <strong>{res} kcal</strong></div>}</div>;}
function WaterCalc(){const [w,setW]=useState("");const [act,setAct]=useState("low");const [res,setRes]=useState(null);const calc=()=>{let b=parseFloat(w)*0.033;if(act==="moderate")b+=0.5;if(act==="high")b+=1.0;setRes(b.toFixed(1));};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>💧 Water Intake Calculator</h3><Field label="Weight (kg)"><input type="number" value={w} onChange={e=>setW(e.target.value)} placeholder="e.g. 70" style={iStyle}/></Field><Field label="Activity"><select value={act} onChange={e=>setAct(e.target.value)} style={iStyle}><option value="low">Low</option><option value="moderate">Moderate</option><option value="high">High</option></select></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>Recommended: <strong>{res} liters/day</strong></div>}</div>;}
function OvulationCalc(){const [lp,setLp]=useState("");const [cl,setCl]=useState("28");const [res,setRes]=useState(null);const calc=()=>{const last=new Date(lp);const cycle=parseInt(cl);const ov=new Date(last);ov.setDate(ov.getDate()+cycle-14);const fs=new Date(ov);fs.setDate(fs.getDate()-5);const fe=new Date(ov);fe.setDate(fe.getDate()+1);const np=new Date(last);np.setDate(np.getDate()+cycle);const fmt=d=>d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});setRes({ov:fmt(ov),fs:fmt(fs),fe:fmt(fe),np:fmt(np)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🌸 Ovulation Calculator</h3><Field label="First Day of Last Period"><input type="date" value={lp} onChange={e=>setLp(e.target.value)} style={iStyle}/></Field><Field label="Cycle Length (days)"><input type="number" value={cl} onChange={e=>setCl(e.target.value)} placeholder="28" style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>🥚 Ovulation: <strong>{res.ov}</strong><br/>💚 Fertile: <strong>{res.fs} — {res.fe}</strong><br/>📅 Next Period: <strong>{res.np}</strong></div>}</div>;}
function MenstrualCalc(){const [lp,setLp]=useState("");const [cl,setCl]=useState("28");const [pl,setPl]=useState("5");const [res,setRes]=useState(null);const calc=()=>{const last=new Date(lp);const cycle=parseInt(cl);const pLen=parseInt(pl);const cycles=[];for(let i=1;i<=6;i++){const s=new Date(last);s.setDate(s.getDate()+cycle*i);const e=new Date(s);e.setDate(e.getDate()+pLen-1);const fmt=d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric"});cycles.push({s:fmt(s),e:fmt(e),n:i});}setRes(cycles);};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🌺 Period Tracker</h3><Field label="First Day of Last Period"><input type="date" value={lp} onChange={e=>setLp(e.target.value)} style={iStyle}/></Field><Field label="Cycle Length (days)"><input type="number" value={cl} onChange={e=>setCl(e.target.value)} placeholder="28" style={iStyle}/></Field><Field label="Period Duration (days)"><input type="number" value={pl} onChange={e=>setPl(e.target.value)} placeholder="5" style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Predict Next 6 Periods</button>{res&&<div style={{marginTop:16}}>{res.map(c=><div key={c.n} style={{...resStyle,marginBottom:8,padding:"10px 14px"}}><strong>Period {c.n}:</strong> {c.s} — {c.e}</div>)}</div>}</div>;}
function IdealWeightCalc(){const [h,setH]=useState("");const [sex,setSex]=useState("male");const [res,setRes]=useState(null);const calc=()=>{const base=sex==="male"?50:45.5;const ideal=base+0.9*(parseFloat(h)-152);setRes({ideal:ideal.toFixed(1),low:(ideal*0.9).toFixed(1),high:(ideal*1.1).toFixed(1)});};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>⚕️ Ideal Weight Calculator</h3><Field label="Sex"><select value={sex} onChange={e=>setSex(e.target.value)} style={iStyle}><option value="male">Male</option><option value="female">Female</option></select></Field><Field label="Height (cm)"><input type="number" value={h} onChange={e=>setH(e.target.value)} placeholder="e.g. 175" style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>Ideal: <strong>{res.ideal} kg</strong> | Range: <strong>{res.low}–{res.high} kg</strong></div>}</div>;}
function BodyFatCalc(){const [neck,setNeck]=useState("");const [waist,setWaist]=useState("");const [h,setH]=useState("");const [sex,setSex]=useState("male");const [hip,setHip]=useState("");const [res,setRes]=useState(null);const calc=()=>{let bf;if(sex==="male")bf=495/(1.0324-0.19077*Math.log10(parseFloat(waist)-parseFloat(neck))+0.15456*Math.log10(parseFloat(h)))-450;else bf=495/(1.29579-0.35004*Math.log10(parseFloat(waist)+parseFloat(hip)-parseFloat(neck))+0.22100*Math.log10(parseFloat(h)))-450;setRes(bf.toFixed(1));};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🏃 Body Fat Calculator</h3><Field label="Sex"><select value={sex} onChange={e=>setSex(e.target.value)} style={iStyle}><option value="male">Male</option><option value="female">Female</option></select></Field><Field label="Neck (cm)"><input type="number" value={neck} onChange={e=>setNeck(e.target.value)} placeholder="e.g. 38" style={iStyle}/></Field><Field label="Waist (cm)"><input type="number" value={waist} onChange={e=>setWaist(e.target.value)} placeholder="e.g. 80" style={iStyle}/></Field>{sex==="female"&&<Field label="Hip (cm)"><input type="number" value={hip} onChange={e=>setHip(e.target.value)} placeholder="e.g. 95" style={iStyle}/></Field>}<Field label="Height (cm)"><input type="number" value={h} onChange={e=>setH(e.target.value)} placeholder="e.g. 175" style={iStyle}/></Field><button onClick={calc} style={btnStyle}>Calculate</button>{res&&<div style={resStyle}>Body Fat: <strong>{res}%</strong></div>}</div>;}

function WorldClock(){const {useState:us,useEffect:ue}=React;const [time,setTime]=us(new Date());ue(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);const zones=[{city:"Lagos",tz:"Africa/Lagos",flag:"🇳🇬"},{city:"London",tz:"Europe/London",flag:"🇬🇧"},{city:"New York",tz:"America/New_York",flag:"🇺🇸"},{city:"Dubai",tz:"Asia/Dubai",flag:"🇦🇪"},{city:"Mumbai",tz:"Asia/Kolkata",flag:"🇮🇳"},{city:"Tokyo",tz:"Asia/Tokyo",flag:"🇯🇵"},{city:"Sydney",tz:"Australia/Sydney",flag:"🇦🇺"},{city:"São Paulo",tz:"America/Sao_Paulo",flag:"🇧🇷"},{city:"Paris",tz:"Europe/Paris",flag:"🇫🇷"},{city:"Singapore",tz:"Asia/Singapore",flag:"🇸🇬"},{city:"Nairobi",tz:"Africa/Nairobi",flag:"🇰🇪"},{city:"Los Angeles",tz:"America/Los_Angeles",flag:"🇺🇸"}];return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🌍 World Clock</h3><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{zones.map(z=><div key={z.city} style={{padding:"12px 14px",borderRadius:12,background:"rgba(108,99,255,0.08)",border:"1.5px solid rgba(108,99,255,0.18)"}}><div style={{fontSize:11,opacity:0.6,marginBottom:2}}>{z.flag} {z.city}</div><div style={{fontWeight:800,fontSize:16,letterSpacing:1,fontVariantNumeric:"tabular-nums"}}>{time.toLocaleTimeString("en-US",{timeZone:z.tz,hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div><div style={{fontSize:11,opacity:0.5}}>{time.toLocaleDateString("en-US",{timeZone:z.tz,weekday:"short",month:"short",day:"numeric"})}</div></div>)}</div></div>;}
function Stopwatch(){const {useState:us,useEffect:ue}=React;const [running,setRunning]=us(false);const [elapsed,setElapsed]=us(0);const [laps,setLaps]=us([]);const [base,setBase]=us(0);const [startAt,setStartAt]=us(null);ue(()=>{let interval;if(running){const s=Date.now();setStartAt(s);interval=setInterval(()=>setElapsed(base+Date.now()-s),50);}else{if(startAt!==null)setBase(b=>b+Date.now()-startAt);}return()=>clearInterval(interval);},[running]);const fmt=(ms)=>{const m=Math.floor(ms/60000);const s=Math.floor((ms%60000)/1000);const cs=Math.floor((ms%1000)/10);return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(cs).padStart(2,"0")}`;};const reset=()=>{setRunning(false);setElapsed(0);setBase(0);setStartAt(null);setLaps([]);};return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>⏱️ Stopwatch</h3><div style={{textAlign:"center",padding:"28px 0 20px"}}><div style={{fontSize:52,fontWeight:900,letterSpacing:3,fontVariantNumeric:"tabular-nums"}}>{fmt(elapsed)}</div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}><button onClick={()=>setRunning(r=>!r)} style={{...btnStyle,background:running?"#e74c3c":"#6c63ff",marginTop:0}}>{running?"Pause":"Start"}</button><button onClick={()=>setLaps(l=>[{n:l.length+1,t:elapsed},...l])} disabled={!running} style={{...btnStyle,background:"#888",marginTop:0,opacity:running?1:0.4}}>Lap</button><button onClick={reset} style={{...btnStyle,background:"#444",marginTop:0}}>Reset</button></div>{laps.length>0&&<div style={{marginTop:16,maxHeight:180,overflowY:"auto"}}>{laps.map(l=><div key={l.n} style={{display:"flex",justifyContent:"space-between",padding:"8px 4px",borderBottom:"1px solid rgba(108,99,255,0.1)",fontSize:14}}><span style={{opacity:0.6}}>Lap {l.n}</span><strong>{fmt(l.t)}</strong></div>)}</div>}</div>;}
function CountdownTimer(){const {useState:us,useEffect:ue}=React;const [hours,setHours]=us("0");const [minutes,setMinutes]=us("5");const [seconds,setSeconds]=us("0");const [total,setTotal]=us(null);const [remaining,setRemaining]=us(null);const [running,setRunning]=us(false);const [done,setDone]=us(false);ue(()=>{if(!running||remaining===null)return;if(remaining<=0){setRunning(false);setDone(true);return;}const t=setTimeout(()=>setRemaining(r=>r-1),1000);return()=>clearTimeout(t);},[running,remaining]);const start=()=>{const t=parseInt(hours||0)*3600+parseInt(minutes||0)*60+parseInt(seconds||0);if(!t)return;setTotal(t);setRemaining(t);setRunning(true);setDone(false);};const reset=()=>{setRunning(false);setRemaining(null);setTotal(null);setDone(false);};const fmt=(s)=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;const pct=total&&remaining!==null?(remaining/total)*100:100;return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>⏳ Countdown Timer</h3>{remaining===null?(<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:8}}><div><label style={{fontSize:13,fontWeight:600,display:"block",marginBottom:4}}>Hours</label><input type="number" value={hours} onChange={e=>setHours(e.target.value)} min="0" style={iStyle}/></div><div><label style={{fontSize:13,fontWeight:600,display:"block",marginBottom:4}}>Minutes</label><input type="number" value={minutes} onChange={e=>setMinutes(e.target.value)} min="0" max="59" style={iStyle}/></div><div><label style={{fontSize:13,fontWeight:600,display:"block",marginBottom:4}}>Seconds</label><input type="number" value={seconds} onChange={e=>setSeconds(e.target.value)} min="0" max="59" style={iStyle}/></div></div><button onClick={start} style={{...btnStyle,marginTop:12}}>Start Countdown</button></>):(<div style={{textAlign:"center",padding:"16px 0"}}>{done?<div style={{fontSize:32,fontWeight:800,color:"#e74c3c",padding:"20px 0"}}>⏰ Time's Up!</div>:(<><div style={{fontSize:52,fontWeight:900,letterSpacing:3,fontVariantNumeric:"tabular-nums"}}>{fmt(remaining)}</div><div style={{height:8,background:"rgba(108,99,255,0.15)",borderRadius:8,margin:"20px 0",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:"#6c63ff",borderRadius:8,transition:"width 1s linear"}}/></div></>)}<div style={{display:"grid",gridTemplateColumns:done?"1fr":"1fr 1fr",gap:8,marginTop:8}}>{!done&&<button onClick={()=>setRunning(r=>!r)} style={{...btnStyle,background:running?"#e74c3c":"#6c63ff",marginTop:0}}>{running?"Pause":"Resume"}</button>}<button onClick={reset} style={{...btnStyle,background:"#444",marginTop:0,gridColumn:done?"1 / -1":"auto"}}>Reset</button></div></div>)}</div>;}
function DigitalClock(){const {useState:us,useEffect:ue}=React;const [time,setTime]=us(new Date());const [tz,setTz]=us(Intl.DateTimeFormat().resolvedOptions().timeZone);ue(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);const tzList=["America/New_York","America/Los_Angeles","America/Chicago","America/Toronto","America/Sao_Paulo","Europe/London","Europe/Paris","Europe/Berlin","Africa/Lagos","Africa/Nairobi","Asia/Dubai","Asia/Kolkata","Asia/Tokyo","Asia/Singapore","Australia/Sydney","Pacific/Auckland"];return <div><h3 style={{fontSize:20,fontWeight:700,marginBottom:16}}>🕐 Digital Clock</h3><Field label="Timezone"><select value={tz} onChange={e=>setTz(e.target.value)} style={iStyle}>{tzList.map(z=><option key={z} value={z}>{z.replace(/_/g," ")}</option>)}</select></Field><div style={{textAlign:"center",padding:"36px 16px",marginTop:16,background:"rgba(108,99,255,0.07)",borderRadius:16}}><div style={{fontSize:48,fontWeight:900,letterSpacing:4,fontVariantNumeric:"tabular-nums"}}>{time.toLocaleTimeString("en-US",{timeZone:tz,hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div><div style={{fontSize:15,opacity:0.6,marginTop:10}}>{time.toLocaleDateString("en-US",{timeZone:tz,weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div></div></div>;}

<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js');});}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;const banner=document.getElementById('install-banner');if(banner)banner.style.display='flex';});
document.addEventListener('DOMContentLoaded',()=>{const btn=document.getElementById('install-btn');const close=document.getElementById('install-close');const banner=document.getElementById('install-banner');if(btn){btn.addEventListener('click',async()=>{if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;if(banner)banner.style.display='none';}});}if(close){close.addEventListener('click',()=>{if(banner)banner.style.display='none';});}});
